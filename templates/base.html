<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Jobsite{% endblock %}</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --primary: #1b4b7a;
      --muted: #6b7a89;
      --shadow: rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: #1b1b1f;
    }

    header {
      padding: 1.5rem 2rem;
      background: linear-gradient(135deg, #2f6c99, #1b4b7a);
      color: #fff;
      box-shadow: 0 1px 14px rgba(0, 0, 0, 0.12);
    }

    header h1 {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: 0.02em;
    }

    main {
      padding: 2rem 2rem 4rem;
      max-width: 960px;
      margin: 0 auto;
    }

    footer {
      padding: 1.25rem 2rem;
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 8px 24px var(--shadow);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .badge {
      display: inline-flex;
      gap: 0.4rem;
      align-items: center;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      background: rgba(27, 75, 122, 0.12);
      color: var(--primary);
      font-size: 0.85rem;
      font-weight: 600;
    }

    .grid {
      display: grid;
      gap: 1.5rem;
    }

    @media (min-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr 1fr;
      }
    }

    .email {
      color: blue;
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="{% url 'jobs:landing' %}" style="color: white; text-decoration: none;">Jobsite</a></h1>
    <nav style="margin-top: 0.5rem;">
      {% if user.is_authenticated %}
        <span style="color: var(--muted); font-size: 0.9rem;">Welcome, {{ user.username }} | </span>
        <a href="{% url 'logout' %}" style="color: var(--primary); font-size: 0.9rem;">Logout</a>
      {% else %}
        <a href="{% url 'login' %}" style="color: var(--primary); font-size: 0.9rem;">Login</a> |
        <a href="{% url 'jobs:register' %}" style="color: var(--primary); font-size: 0.9rem;">Register</a>
      {% endif %}
    </nav>
  </header>

  <main>
    {% block content %}
    <p>Welcome to your Jobsite Django project.</p>
    {% endblock %}
  </main>

  <footer>
    <p>©  {% now "Y" %}
  </footer>
</body>
</html>
